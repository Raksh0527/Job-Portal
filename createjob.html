<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Job</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f5f7fb;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:500px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 5px 20px rgba(0,0,0,.1);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        .input-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
        }

        input,
        textarea,
        select{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:15px;
        }

        textarea{
            resize:none;
        }

        button{
            width:100%;
            padding:12px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#1d4ed8;
        }

    </style>

</head>
<body>

<div class="container">

    <h2>Create New Job</h2>

    <form id="jobForm">

        <div class="input-group">
            <label>Company Name</label>
            <input
            type="text"
            id="company"
            required>
        </div>

        <div class="input-group">
            <label>Job Title</label>
            <input
            type="text"
            id="role"
            required>
        </div>

     

        <div class="input-group">
            <label>Location</label>
            <input
            type="text"
            id="location"
            required>
        </div>

        <div class="input-group">
            <label>Salary</label>
            <input
            type="number"
            id="salary"
            required>
        </div>

        <div class="input-group">
            <label>Experience</label>

            <select id="experience">

                <option>Fresher</option>
                <option>1 Year</option>
                <option>2 Years</option>
                <option>3+ Years</option>

            </select>

        </div>

        <div class="input-group">

            <label>Skills</label>

            <input
            type="text"
            id="skills"
            placeholder="Node.js, Express, MongoDB">

        </div>

        <div class="input-group">

            <label>Description</label>

            <textarea
            id="description"
            rows="5"></textarea>

        </div>

        <button type="submit">
            Create Job
        </button>

    </form>

</div>

<script src="createjob.js"></script>

</body>
</html>
