<!DOCTYPE html>
<html>
<head>
    <title>Sign-Up</title>
</head>

<style>

  body{
    background-image: url(regBG.png);
    background-repeat: no-repeat;
    background-size: cover;
  }  

form{
        background-color: transparent;
        box-shadow: 20px 30px 20px;
        margin-top: 5px;
        border: none;
        height: 500px;
        width: 500px;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        border-radius: 20px;
        font-weight: bold;
        font-size: medium;
    }
    input{
    height: 40px; 
    width: 300px; 
    border-radius: 10px; 
    text-align: center; 
    border: none; 
    }
    button{
        height: 40px;
        width: 300px;
        border-radius: 10px;
        border: none;
        background-color: rgb(80, 201, 80);
    }
    button:hover{
        background-color: rgb(3, 97, 3);
        color: whitesmoke;
        border: 1px  solid rgb(1, 47, 1);
        border-radius: 10px;
    }


</style>
<body style="display:flex;align-items:center;justify-content: center;flex-direction: column;">



<form id="registerForm">


    <h2 style="color: white; font-weight: bold; font-size:30px; font-family: 'Open Sans', 'Helvetica Neue', Arial, sans-serif;">Sign Up</h2>
    <br>
    <input
        type="text"
        id="name"
        placeholder="Name"
        required
    >

    <br><br>

    <input
        type="email"
        id="email"
        placeholder="Email"
        required
    >

    <br><br>

    <input
        type="password"
        id="password"
        placeholder="Password"
        required
    >

    <br><br>

    <button type="submit">
        Register
    </button>

</form>

<script src="register.js"></script>

</body>
</html>
