<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Available Jobs</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f7fb;
}

header{

    background:#2563eb;
    color:white;
    padding:18px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h2{
    font-size:26px;
}

header nav a{

    color:white;
    text-decoration:none;
    margin-left:20px;
    font-weight:bold;

}

.container{

    width:90%;
    max-width:1200px;
    margin:40px auto;

}

.heading{

    margin-bottom:25px;
    color:#333;

}

.job-container{

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
    gap:25px;

}

.job-card{

    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    transition:.3s;

}

.job-card:hover{

    transform:translateY(-5px);

}

.job-title{

    font-size:22px;
    color:#2563eb;
    margin-bottom:10px;

}

.company{

    font-weight:bold;
    margin-bottom:10px;

}

.info{

    margin:8px 0;
    color:#555;

}

.description{

    margin:15px 0;
    color:#666;
    line-height:1.5;

}

.btn-group{

    margin-top:20px;
    display:flex;
    gap:10px;

}

button{

    flex:1;
    padding:10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:15px;

}

.details{

    background:#2563eb;
    color:white;

}

.apply{

    background:#16a34a;
    color:white;

}

.delete{

    background:rgb(241, 113, 113);
    color:white;

}

button:hover{

    opacity:.9;

}

/* Modal Background */

.modal{

    display:none;

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.5);

    justify-content:center;
    align-items:center;

}

/* White Box */
.modal-content{

    background:white;

    width:500px;

    padding:25px;

    border-radius:10px;

    position:relative;

}

/* Close Button */
.close{

    position:absolute;

    right:20px;

    top:15px;

    font-size:28px;

    cursor:pointer;

}

.modal{
    display: none;
}
svg{
    width: 15x;
    height: 15px;
    position: absolute;
  
}
.edit-icon{
    background-color: transparent;
    height: -1;
    width: -3;
    display: flex;
    align-items: end;
    justify-content: right;
    margin-left: 95%;
   position: relative;

}
#editModel{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.5);

    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    width:700px;
    padding:20px;
    border-radius:10px;
    max-height:90vh;
    overflow:auto;
}





</style>

</head>

<body>

<header>

<h2>Job Portal</h2>

<nav>

<a href="home.html">Home</a>

<a href="createJob.html">Post Job</a>

<a href="jobs.html">Jobs</a>

<a href="#">Profile</a>

</nav>

</header>

<div class="container">

<h1 class="heading">Available Jobs</h1>


<div class="job-container" id="jobContainer">

<!-- Jobs will appear here -->

</div>

<div id="viewModal" class="modal">

    <div class="modal-content">

        <span id="close" style="cursor: pointer; display: flex; justify-content: right; align-items: end;">&times;</span>

        <h2>Job Details</h2>

        <div id="modalBody">

        </div>

    </div>

</div>

<div id="deleteModal" class="modal">

    <div class="modal-content">

        <h4 style="color: rgb(227, 98, 98);">Delete Job</h4><br>

        <p>Are you sure you want to delete this job?</p> <br>

        <button id="cancelBtn">Cancel</button>
            &nbsp;&nbsp;&nbsp;&nbsp;
        <button id="confirmDelete">Delete</button>

    </div>
    </div>


   <div id="editModel" class="modal">

    <div class="modal-content">

        <span id="closeEdit" onclick="closeEdits()" style="cursor:default;">&times;</span>

        <div id="editBody"></div>

    </div>

</div>

<script src="jobs.js">


</script>

</body>
</html>
